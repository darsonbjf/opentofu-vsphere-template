name: Prod safety guardrails

on:
  pull_request:
  push:
    branches:
      - develop
      - main
      - master

permissions:
  contents: read

jobs:
  prod-safety:
    name: Check production destroy guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check guardrails
        run: bash scripts/check_prod_destroy_guardrails.sh
