version: 2

multi-ecosystem-groups:
  weekly-maintenance:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Fortaleza"
    labels:
      - "dependencies"
      - "maintenance"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "opentofu"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
